<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="dropG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="64" height="64" rx="14" fill="#0f2a1a"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="#22c55e" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Gota -->
  <path d="M32 10 C32 10 14 32 14 44 C14 55 22 62 32 62 C42 62 50 55 50 44 C50 32 32 10 32 10Z"
        fill="url(#dropG)" filter="url(#glow)"/>
  <!-- Reflexo -->
  <path d="M32 10 C32 10 20 30 17 42 C15 50 20 60 32 61"
        fill="#4ade80" opacity="0.35"/>

  <!-- Folha interna -->
  <path d="M32 50 C32 50 19 39 19 31 C19 24 25 21 32 22 C39 21 45 24 45 31 C45 39 32 50 32 50Z"
        fill="#4ade80" opacity="0.9"/>
  <!-- Caule -->
  <line x1="32" y1="22" x2="32" y2="50" stroke="#15803d" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Veias -->
  <path d="M32 40 C25 37 19 33 18 27" fill="none" stroke="#15803d" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M32 40 C39 37 45 33 46 27" fill="none" stroke="#15803d" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Brilho -->
  <ellipse cx="20" cy="30" rx="3" ry="7" fill="#bbf7d0" opacity="0.4" transform="rotate(-20 20 30)"/>
</svg>
