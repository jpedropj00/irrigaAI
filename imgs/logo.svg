<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1e14"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo pill -->
  <rect width="320" height="100" rx="20" fill="url(#bgGrad)"/>
  <!-- Borda sutil -->
  <rect width="320" height="100" rx="20" fill="none" stroke="#1e3a2a" stroke-width="1.5"/>

  <!-- Ícone — fundo quadrado arredondado -->
  <rect x="18" y="18" width="64" height="64" rx="16" fill="#0f2a1a"/>
  <rect x="18" y="18" width="64" height="64" rx="16" fill="none" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Gota d'água -->
  <path d="M50 26 C50 26 34 44 34 54 C34 63 41 70 50 70 C59 70 66 63 66 54 C66 44 50 26 50 26Z"
        fill="url(#dropGrad)" filter="url(#glow)"/>
  <!-- Reflexo da gota -->
  <path d="M50 26 C50 26 40 42 38 52 C36 59 40 67 50 69"
        fill="#4ade80" opacity="0.35"/>

  <!-- Folha interna -->
  <path d="M50 57 C50 57 39 48 39 41 C39 35 44 32 50 33 C56 32 61 35 61 41 C61 48 50 57 50 57Z"
        fill="#4ade80" opacity="0.9"/>
  <!-- Caule -->
  <line x1="50" y1="33" x2="50" y2="57" stroke="#15803d" stroke-width="2" stroke-linecap="round"/>
  <!-- Veias -->
  <path d="M50 47 C44 44 39 41 38 36" fill="none" stroke="#15803d" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 47 C56 44 61 41 62 36" fill="none" stroke="#15803d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Brilho -->
  <ellipse cx="40" cy="40" rx="2.5" ry="5.5" fill="#bbf7d0" opacity="0.45" transform="rotate(-20 40 40)"/>

  <!-- Texto IrrigAI -->
  <text x="98" y="56"
    font-family="Inter, Segoe UI, system-ui, sans-serif"
    font-weight="800"
    font-size="34"
    letter-spacing="-0.03em">
    <tspan fill="#f1f5f9">Irrig</tspan><tspan fill="#4ade80">AI</tspan>
  </text>

  <!-- Subtítulo -->
  <text x="100" y="73"
    font-family="Inter, Segoe UI, system-ui, sans-serif"
    font-weight="400"
    font-size="11"
    fill="#7a8fab"
    letter-spacing="0.08em">IRRIGAÇÃO INTELIGENTE</text>
</svg>
